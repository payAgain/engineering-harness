name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.10', '3.13']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Exercise installed CLI
        run: |
          eh --version
          eh doctor

      - name: Initialize and audit generated project
        shell: bash
        run: |
          target="$RUNNER_TEMP/eh-generated-project"
          eh init "$target" --level Standard --name ci-generated --docs none
          eh audit "$target"

      - name: Verify built wheel as a clean consumer
        run: python tests/wheel_consumer_smoke.py
